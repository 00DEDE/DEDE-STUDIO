<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CONNECTIONS — I AM DĒDĒ.STUDIO</title>
<link rel="canonical" href="https://iamdede.com/connections.html" />
<link rel="icon" type="image/png" sizes="96x96" href="ASSETS/LOGO/logo_favicon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="ASSETS/LOGO/apple-touch-icon.png" />

<meta name="theme-color" content="#050505" />

<link rel="stylesheet" href="theme.css" />
<link rel="stylesheet" href="site-header.css" />
<link rel="stylesheet" href="site-footer.css" />
<link rel="stylesheet" href="site-bg.css" />
<style>
  @font-face {
    font-family: "Akzidenz Grotesk";
    src: url("ASSETS/FONTS/AKZIDENZGROTESK-REGULAR.OTF") format("opentype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  html { background: #050505; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    width: 100%;
    cursor: url("ASSETS/LOGO/cursor_dede.png") 16 16, auto;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    overflow-x: hidden;
  }
  body { background: transparent; }
  a, button, [role="button"] {
    cursor: url("ASSETS/LOGO/cursor_dede.png") 16 16, pointer;
  }

  /* Say-hello block: same font, weight, size and rhythm as the intro
     paragraphs, so both pages read from the same voice. */
  .hello {
    padding: 6rem 5vw 6rem;
    max-width: 90rem;
    margin: 0 auto;
    box-sizing: border-box;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  @media (max-width: 640px) {
    .hello { padding-top: 10rem; }
  }
  .hello p {
    color: #ffffff;
    font-family: "Akzidenz Grotesk", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-weight: 400;
    font-size: clamp(1.5rem, 4.5vw, 5.5rem);
    line-height: 1.1;
    letter-spacing: -0.015em;
    margin: 0;
    text-wrap: balance;
  }
  .hello__contact {
    margin-top: 2.5rem;
  }
  /* Cycling greeting fades gracefully between languages. */
  .greeting-word {
    display: inline-block;
    transition: opacity 1s ease;
  }

  /* Email link: same radiating cyan glow used for DĒDĒ + BLLCRW on the
     introductions page, so interactive words have a consistent language. */
  .email-link {
    color: inherit;
    text-decoration: none;
    animation: link-glow 2.5s ease-in-out infinite;
    transition: color 0.3s ease;
    cursor: url("ASSETS/LOGO/cursor_dede.png") 16 16, pointer;
  }
  .email-link:hover,
  .email-link:focus-visible {
    color: #00dede;
  }

  /* Mail-app chooser — appears below the email on click. */
  .email-options {
    display: flex;
    align-items: baseline;
    gap: 0.6em;
    margin-top: 0.75rem;
    font-size: clamp(0.85rem, 2.25vw, 2.75rem); /* ~half the paragraph size */
    letter-spacing: -0.01em;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, opacity 0.4s ease, margin-top 0.4s ease;
  }
  .email-options.is-open {
    max-height: 6em;
    opacity: 1;
  }
  .email-option {
    color: #ffffff;
    text-decoration: none;
    transition: color 0.3s ease;
  }
  .email-option:hover,
  .email-option:focus-visible {
    color: #00dede;
  }
  .email-options__sep {
    opacity: 0.5;
  }
  /* Same shape/rhythm as the DĒDĒ glow on introductions, but scaled back
     because the email is a much longer string (~18 chars vs DĒDĒ's 4) and
     the accumulated glow was reading as too blue. */
  @keyframes link-glow {
    0%, 100% {
      text-shadow:
        0 0 0.2em rgba(0, 222, 222, 0.25),
        0 0 0.5em rgba(0, 222, 222, 0.12),
        0 0 0.9em rgba(0, 222, 222, 0.06);
    }
    50% {
      text-shadow:
        0 0 0.35em rgba(0, 222, 222, 0.55),
        0 0 0.8em  rgba(0, 222, 222, 0.28),
        0 0 1.4em  rgba(0, 222, 222, 0.14);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .email-link {
      animation: none;
      text-shadow:
        0 0 0.3em rgba(0, 222, 222, 0.4),
        0 0 0.7em rgba(0, 222, 222, 0.2);
    }
  }
</style>
</head>
<body>
  <div class="site-bg" aria-hidden="true">
    <div class="site-bg__blob site-bg__blob--cyan-1"></div>
    <div class="site-bg__blob site-bg__blob--cyan-2"></div>
    <div class="site-bg__blob site-bg__blob--dark-1"></div>
    <div class="site-bg__blob site-bg__blob--dark-2"></div>
  </div>
  <header class="site-header">
    <a class="site-header__brand" href="home.html" aria-label="DEDE STUDIO — home">
      <img class="theme-img theme-img--dark" src="ASSETS/LOGO/logo_horizontal_cyan.png" alt="DEDE STUDIO" /><img class="theme-img theme-img--light" src="ASSETS/LOGO/logo_horizontal_red.png" alt="DEDE STUDIO" />
    </a>
    <div class="site-header__end">
      <nav class="site-header__nav" aria-label="Primary">
        <a href="selections.html">SELECTIONS</a>
        <a href="concepts.html">CONCEPTS</a>
        <a href="introductions.html">INTRODUCTIONS</a>
        <a href="connections.html">CONNECTIONS</a>
      </nav>
      <button class="site-header__theme-toggle" type="button" aria-label="Toggle color theme">
        <span class="site-header__theme-toggle-thumb" aria-hidden="true"></span>
      </button>
    </div>
  </header>
  <script src="site-header.js" defer></script>

  <section class="hello" aria-label="Contact">
    <p><span class="greeting-word" id="greetingWord">Say hello</span></p>
    <div class="hello__contact">
      <p>DAVID GOMEZ</p>
      <p>Head of Dēdē.Studio</p>
      <p>
        <a class="email-link"
           href="#"
           id="emailToggle"
           role="button"
           aria-expanded="false"
           aria-controls="emailOptions">iamdede@bllcrw.com</a>
      </p>
      <div class="email-options" id="emailOptions">
        <a class="email-option" href="mailto:iamdede@bllcrw.com">mail app</a>
        <span class="email-options__sep" aria-hidden="true">·</span>
        <a class="email-option" href="https://mail.google.com/mail/?view=cm&amp;fs=1&amp;to=iamdede@bllcrw.com" target="_blank" rel="noopener">gmail</a>
      </div>
    </div>
  </section>

  <script>
    // Cycle the greeting through English → Spanish → French.
    (function () {
      const el = document.getElementById('greetingWord');
      if (!el) return;
      const greetings = ['Say hello', 'Mandame un saludito', 'Dis-moi bonjour'];
      let idx = 0;
      const HOLD_MS = 2500;
      const FADE_MS = 1000;
      setInterval(() => {
        el.style.opacity = '0';
        setTimeout(() => {
          idx = (idx + 1) % greetings.length;
          el.textContent = greetings[idx];
          el.style.opacity = '1';
        }, FADE_MS);
      }, HOLD_MS + FADE_MS);
    })();

    // Email chooser: click to reveal mail app / gmail options.
    (function () {
      const toggle = document.getElementById('emailToggle');
      const options = document.getElementById('emailOptions');
      if (!toggle || !options) return;

      function setOpen(open) {
        options.classList.toggle('is-open', open);
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      }

      toggle.addEventListener('click', (e) => {
        e.preventDefault();
        setOpen(!options.classList.contains('is-open'));
      });

      // Any tap outside the chooser closes it.
      document.addEventListener('click', (e) => {
        if (e.target.closest('#emailOptions') || e.target === toggle) return;
        setOpen(false);
      });

      // Escape closes it too.
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') setOpen(false);
      });
    })();
  </script>

  <footer class="site-footer">
    <a class="site-footer__logo" href="home.html" aria-label="DEDE STUDIO — home">
      <img class="theme-img theme-img--dark" src="ASSETS/LOGO/logo_horizontal_white.png" alt="DEDE STUDIO" /><img class="theme-img theme-img--light" src="ASSETS/LOGO/logo_horizontal_red.png" alt="DEDE STUDIO" />
    </a>

      <div class="site-footer__meta-left">
        <span>© 2026 ALL RIGHTS RESERVED.</span>
      </div>
      <div class="site-footer__meta-center">
        <span>DEFINE EXPRESSION. DESIGN EXISTENCE.</span>
      </div>
      <div class="site-footer__meta-right">
        <a href="#" onclick="event.preventDefault(); window.scrollTo({top:0,behavior:'smooth'});">BACK TO TOP</a>
        <a href="https://www.linkedin.com/in/dedestudio" target="_blank" rel="noopener">LINKEDIN</a>
      </div>
    </div>
  </footer>
</body>
</html>
