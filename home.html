<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>I AM DĒDĒ.STUDIO</title>
<link rel="canonical" href="https://iamdede.com/home.html" />
<link rel="icon" type="image/png" sizes="96x96" href="ASSETS/LOGO/logo_favicon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="ASSETS/LOGO/apple-touch-icon.png" />
<link rel="manifest" href="site.webmanifest" />
<meta name="theme-color" content="#050505" />
<script>(function(){try{var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="theme.css" />
<link rel="stylesheet" href="site-bg.css" />
<style>
  html { background: #050505; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    cursor: url("ASSETS/LOGO/cursor_dede.png") 16 16, auto;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Two DĒDĒ logos stacked in the same spot; JS toggles is-visible to
     cycle between them. Progressively faster over ~3s, then handoff. */
  .logo-cycle {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: min(60vw, 560px);
    height: min(60vh, 500px);
  }
  .logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.15s ease-out;
    display: block;
  }
  .logo.is-visible { opacity: 1; }

  .logo--horizontal {
    /* 60% smaller than the previous sizing (×0.4). */
    width: clamp(112px, 13.6vw, 208px);
    height: auto;
  }
  .logo--stacked {
    /* 60% smaller than the previous sizing (×0.4). */
    width: clamp(80px, 9.6vw, 144px);
    height: auto;
  }

  @media (prefers-reduced-motion: reduce) {
    .logo { transition: none; }
  }
</style>
</head>
<body>
  <div class="site-bg" aria-hidden="true">
    <div class="site-bg__blob site-bg__blob--cyan-1"></div>
    <div class="site-bg__blob site-bg__blob--cyan-2"></div>
    <div class="site-bg__blob site-bg__blob--dark-1"></div>
    <div class="site-bg__blob site-bg__blob--dark-2"></div>
  </div>

  <div class="logo-cycle" role="status" aria-label="Loading DĒDĒ.STUDIO">
    <img class="logo logo--horizontal is-visible"
         src="ASSETS/LOGO/logo_horizontal_cyan.png"
         alt="DĒDĒ STUDIO" />
    <img class="logo logo--stacked"
         src="ASSETS/LOGO/logo_stacked_cyan.png"
         alt="DĒDĒ STUDIO" />
  </div>

  <script>
    (function () {
      const logos = document.querySelectorAll('.logo-cycle .logo');
      const DURATION_MS      = 5000;   // total cycle window
      const START_INTERVAL   = 420;    // graceful cadence at t=0
      const END_INTERVAL     = 40;     // rapid cadence at t=3s
      let active = 0;                  // logos[0] starts visible
      const start = performance.now();

      // Reduced motion: skip the animation and go straight through.
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        window.location.replace('selections.html');
        return;
      }

      function tick() {
        const elapsed = performance.now() - start;

        // Swap which logo is visible.
        logos[active].classList.remove('is-visible');
        active = (active + 1) % logos.length;
        logos[active].classList.add('is-visible');

        if (elapsed >= DURATION_MS) {
          // Let the final frame paint, then hand off.
          setTimeout(() => window.location.replace('selections.html'), 80);
          return;
        }

        // Interval shrinks from START to END with a squared curve — accelerates
        // gently at first, ramps up hard toward the end (rapid succession).
        const progress = elapsed / DURATION_MS;
        const nextInterval = START_INTERVAL
          - (START_INTERVAL - END_INTERVAL) * (progress * progress);
        setTimeout(tick, nextInterval);
      }

      setTimeout(tick, START_INTERVAL);
    })();
  </script>
</body>
</html>
