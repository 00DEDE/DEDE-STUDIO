<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>I AM DĒDĒ.STUDIO</title>
<link rel="canonical" href="https://iamdede.com/home.html" />
<link rel="icon" type="image/png" sizes="96x96" href="ASSETS/LOGO/logo_favicon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="ASSETS/LOGO/apple-touch-icon.png" />
<link rel="manifest" href="site.webmanifest" />
<meta name="theme-color" content="#121212" />
<script>
  // If this page loads as a refresh (or the user opens it directly),
  // send them back through the splash instead.
  const nav = performance.getEntriesByType('navigation')[0];
  if (nav && nav.type === 'reload') {
    window.location.replace('index.html');
  }
</script>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #121212;
    cursor: url("ASSETS/LOGO/cursor_dede.png") 16 16, auto;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  }
  a, button, [role="button"] {
    cursor: url("ASSETS/LOGO/cursor_dede.png") 16 16, pointer;
  }

  .header-logo {
    position: absolute;
    top: 2rem;
    left: 50%;
    transform: translateX(-50%);
    width: 11vw;
    max-width: 160px;
    min-width: 90px;
    height: auto;
    display: block;
  }
  @media (max-width: 640px) {
    .header-logo {
      width: 13.75vw;
      max-width: 200px;
      min-width: 112px;
    }
  }

  /* ----- Hamburger nav (4 stacked bars from DEDE_ICON LOGO_BLACK) ----- */
  .hamburger {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    aspect-ratio: 933 / 1083;
    width: min(38vw, 340px);
    opacity: 0;
    animation: hamburger-fade-in 1.4s cubic-bezier(0.25, 0.8, 0.4, 1) 0.4s forwards;
  }
  @media (max-width: 640px) {
    .hamburger {
      width: min(58vw, 260px);
    }
  }
  @keyframes hamburger-fade-in {
    to { opacity: 1; }
  }

  .menu-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 12%;
    top: var(--y);
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    outline: none;
  }
  .line-img {
    width: 100%;
    display: block;
    transition: opacity 0.6s ease;
  }
  .line-word {
    position: absolute;
    color: #00dede;
    font-weight: 700;
    font-size: clamp(0.9rem, 2.4vw, 1.5rem);
    letter-spacing: 0.02em;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  @media (max-width: 640px) {
    .line-word {
      font-size: clamp(1.125rem, 3vw, 1.875rem);
    }
  }
  .menu-line:focus-visible .line-img,
  .menu-line.is-active .line-img {
    opacity: 0;
  }
  .menu-line:focus-visible .line-word,
  .menu-line.is-active .line-word {
    opacity: 1;
  }
  /* Only apply :hover on real hover-capable devices — otherwise iOS
     "sticky hover" keeps the word visible after tap, breaking the 2s reset. */
  @media (hover: hover) {
    .menu-line:hover .line-img { opacity: 0; }
    .menu-line:hover .line-word { opacity: 1; }
  }
</style>
</head>
<body>
  <img class="header-logo" src="ASSETS/LOGO/logo_horizontal_cyan.png" alt="DEDE STUDIO" />

  <nav class="hamburger" aria-label="Main menu">
    <a class="menu-line" href="selections.html" style="--y: 2.68%">
      <img class="line-img" src="ASSETS/LOGO/hamburger_line_1.png" alt="" aria-hidden="true" />
      <span class="line-word">SELECTIONS</span>
    </a>
    <a class="menu-line" href="concepts.html" style="--y: 22.44%">
      <img class="line-img" src="ASSETS/LOGO/hamburger_line_2.png" alt="" aria-hidden="true" />
      <span class="line-word">CONCEPTS</span>
    </a>
    <a class="menu-line" href="introductions.html" style="--y: 59.84%">
      <img class="line-img" src="ASSETS/LOGO/hamburger_line_3.png" alt="" aria-hidden="true" />
      <span class="line-word">INTRODUCTIONS</span>
    </a>
    <a class="menu-line" href="connections.html" style="--y: 97.23%">
      <img class="line-img" src="ASSETS/LOGO/hamburger_line_4.png" alt="" aria-hidden="true" />
      <span class="line-word">CONNECTIONS</span>
    </a>
  </nav>
  <script>
    // Touch devices don't do hover; use tap-to-reveal, tap-again-to-navigate.
    if (window.matchMedia('(hover: none)').matches) {
      let activeLine = null;
      let timer = null;

      function reset() {
        if (activeLine) activeLine.classList.remove('is-active');
        activeLine = null;
        if (timer) { clearTimeout(timer); timer = null; }
      }

      document.querySelectorAll('.menu-line').forEach((line) => {
        line.addEventListener('click', (e) => {
          if (activeLine === line) {
            // Second tap on the active line -> allow default navigation.
            reset();
            return;
          }
          // First tap, or tap on a different line -> reveal the word.
          e.preventDefault();
          reset();
          activeLine = line;
          line.classList.add('is-active');
          timer = setTimeout(reset, 2000);
        });
      });
    }
  </script>
</body>
</html>
