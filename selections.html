<style>
  html { background: #050505; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    width: 100%;
    color: #ffffff;
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    cursor: url("ASSETS/LOGO/cursor_dede.png") 16 16, auto;
  }
  body { background: transparent; }
  a, button, [role="button"] {
    cursor: url("ASSETS/LOGO/cursor_dede.png") 16 16, pointer;
  }

  .selections {
    position: relative;
    width: 100vw;
    min-height: 100vh;
  }

  /* Two stacked background layers so we can crossfade. Fixed so the
     hover-swap backdrop stays behind the grid regardless of scroll. */
  .bg-layer {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: opacity 0.6s ease;
    z-index: 0;
    pointer-events: none;
  }
  .bg-layer.is-active { opacity: 1; }
  .bg-layer.is-idle   { opacity: 0; }
  /* Hovering the header or footer clears the cell gradient so the shared
     animated site-bg shows through underneath. */
  body:has(.site-header:hover) .bg-layer,
  body:has(.site-footer:hover) .bg-layer {
    opacity: 0;
  }

  /* Editorial grid: hero at top and bottom, thin+long pairs in between.
     12-col track with per-cell grid-column spans; grid grows past viewport
     and the page scrolls (the fixed bg-layer stays behind everything). */
  .selections-grid {
    --grid-row:      clamp(320px, 44vh, 640px);
    /* Hero rows are 15% shorter than the previous 2× stack (2 × row × 0.85). */
    --grid-hero-row: clamp(544px, 74.8vh, 1088px);

    position: relative;
    z-index: 1;
    /* Padding-top clears the fixed header (~71px tall at rest) — 96px gives
       comfortable breathing room so hero cell content isn't slid under it. */
    padding-top: 96px;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows:
      var(--grid-hero-row)
      var(--grid-row)
      var(--grid-row)
      var(--grid-row)
      var(--grid-hero-row);
    gap: 1px;
  }
  @media (max-width: 640px) {
    .selections-grid {
      padding-top: 152px;
      /* Simpler single-column stack on mobile so each cell still reads. */
      grid-template-columns: 1fr;
      grid-template-rows: none;
      grid-auto-rows: 64vh;
    }
  }

  .cell {
    position: relative;
    color: var(--fg);
    text-decoration: none;
    box-sizing: border-box;
    background-color: transparent;
    background-size: cover;
    background-position: center;
    box-shadow: inset 0 0 0 1px var(--line);
    transition: background-color 0.35s ease, color 0.35s ease,
                opacity 0.9s ease-out, transform 0.9s ease-out;
  }
  /* Hero cell 1 — carries the UNESCO cover photo permanently.
     The hover swap uses background-color only (not the shorthand) so this
     background-image is preserved when other cells' bg swaps to a solid fill. */
  .cell--cover {
    background-image: url("ASSETS/IMAGES/UNESCO_REBRAND.jpg");
  }
  /* Bottom-left tag stack — shows only on cells that carry cover images. */
  .cell-tags {
    position: absolute;
    left: 1.25rem;
    bottom: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    color: #ffffff;
    font-weight: 700;
    font-size: clamp(0.72rem, 1vw, 0.95rem);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.55);
    z-index: 2;
    pointer-events: none;
  }
  @media (max-width: 640px) {
    .cell-tags { left: 0.75rem; bottom: 0.75rem; font-size: 0.72rem; }
  }
  /* "Arrival" — cells below the initial viewport sit slightly lower and
     dimmer, then rise + fade to full when they scroll into view. JS toggles
     .needs-reveal on below-fold cells and .is-in-view when they cross the
     threshold. */
  .cell.needs-reveal:not(.is-in-view) {
    opacity: 0.35;
    transform: translateY(24px);
  }

  /* Cell placements: HERO / thin+long / long+thin / thin+long / HERO.
     Hero cells span the full row; their height comes from the explicit
     --grid-hero-row track, not from spanning two rows. */
  .cell:nth-child(1),
  .cell:nth-child(8) {
    grid-column: 1 / -1;
  }
  .cell:nth-child(2) { grid-column: span 4; }   /* thin */
  .cell:nth-child(3) { grid-column: span 8; }   /* long */
  .cell:nth-child(4) { grid-column: span 8; }   /* long */
  .cell:nth-child(5) { grid-column: span 4; }   /* thin */
  .cell:nth-child(6) { grid-column: span 4; }   /* thin */
  .cell:nth-child(7) { grid-column: span 8; }   /* long */
  /* Mobile flattens all spans — every cell fills the single column. */
  @media (max-width: 640px) {
    .cell:nth-child(n) {
      grid-column: 1 / -1;
      grid-row: auto;
    }
  }

  /* Hover / active: swap the cell to the fg color as a solid fill (dark on
     light theme, light on dark theme). Cells with a cover image keep the
     image visible — a subtle overlay shows on hover instead. */
  @media (hover: hover) {
    .cell:hover {
      background-color: var(--fg);
    }
  }
  .cell.is-active {
    background-color: var(--fg);
  }
  /* Cover-image cells (like the UNESCO hero) don't get the solid-fill hover —
     the image would be occluded. A translucent overlay shows interactivity. */
  .cell--cover::after {
    content: '';
    position: absolute;
    inset: 0;
    background: transparent;
    transition: background 0.35s ease;
    pointer-events: none;
  }
  @media (hover: hover) {
    .cell--cover:hover {
      background-color: transparent;
    }
    .cell--cover:hover::after {
      background: rgba(0, 0, 0, 0.15);
    }
  }
  .cell--cover.is-active {
    background-color: transparent;
  }
  .cell--cover.is-active::after {
    background: rgba(0, 0, 0, 0.15);
  }

  /* Subtle scroll cue — pinned to bottom-center, gently bouncing to imply
     "there's more below". Fades out once the user has actually scrolled. */
  .scroll-cue {
    position: fixed;
    bottom: 1.75rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    color: rgba(var(--fg-rgb), 0.75);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-weight: 500;
    font-size: 0.7rem;
    letter-spacing: 0.28em;
    opacity: 1;
    transition: opacity 0.5s ease;
    animation: scroll-cue-bounce 2.4s ease-in-out infinite;
  }
  .scroll-cue.is-hidden { opacity: 0; }
  .scroll-cue__arrow {
    font-size: 1rem;
    letter-spacing: 0;
  }
  @keyframes scroll-cue-bounce {
    0%, 100% { transform: translate(-50%, 0); }
    50%      { transform: translate(-50%, 8px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .cell.needs-reveal:not(.is-in-view) {
      opacity: 1;
      transform: none;
    }
    .scroll-cue { animation: none; }
  }
</style>

<body>

  <script>
    // Crossfade between two bg layers so background swaps aren't a hard cut.
    const bgA = document.getElementById('bgA');
    const bgB = document.getElementById('bgB');
    let active = bgA;
    let idle = bgB;

    // No initial background — let the shared site-bg show through until a cell is hovered.

    function setBackground(image) {
      idle.style.backgroundImage = image;
      idle.classList.remove('is-idle');
      idle.classList.add('is-active');
      active.classList.remove('is-active');
      active.classList.add('is-idle');
      [active, idle] = [idle, active];
    }

    // Cell gradients are theme-aware — dark grads in dark mode, light grads
    // in light mode. Each cell carries both variants; this picks the right one.
    function gradFor(cell) {
      const light = document.documentElement.getAttribute('data-theme') === 'light';
      return cell.getAttribute(light ? 'data-bg-light' : 'data-bg')
          || cell.getAttribute('data-bg');
    }
    // Track the last-activated cell so we can refresh the backdrop when the
    // user flips the theme toggle mid-hover.
    let lastCell = null;

    const isTouch = window.matchMedia('(hover: none)').matches;

    if (isTouch) {
      // Tap-to-reveal, tap-again-to-navigate (same pattern as the hamburger).
      let activeCell = null;
      let timer = null;
      const RESET_MS = 2000;

      function reset() {
        if (activeCell) activeCell.classList.remove('is-active');
        activeCell = null;
        if (timer) { clearTimeout(timer); timer = null; }
      }

      document.querySelectorAll('.cell').forEach((cell) => {
        cell.addEventListener('click', (e) => {
          if (activeCell === cell) {
            reset();
            return; // allow default navigation
          }
          e.preventDefault();
          reset();
          activeCell = cell;
          cell.classList.add('is-active');
          lastCell = cell;
          const grad = gradFor(cell);
          if (grad) setBackground(grad);
          timer = setTimeout(reset, RESET_MS);
        });
      });
    } else {
      document.querySelectorAll('.cell').forEach((cell) => {
        cell.addEventListener('mouseenter', () => {
          lastCell = cell;
          const grad = gradFor(cell);
          if (grad) setBackground(grad);
        });
      });
    }

    // Re-swap the current cell's gradient when the theme toggle flips.
    new MutationObserver(() => {
      if (!lastCell) return;
      const grad = gradFor(lastCell);
      if (grad) setBackground(grad);
    }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    // "Walking through" reveal: below-fold cells arrive as they scroll into view.
    (function () {
      const cells = document.querySelectorAll('.cell');
      if (!('IntersectionObserver' in window)) return;
      const io = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-in-view');
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -8% 0px' });

      cells.forEach((cell) => {
        const rect = cell.getBoundingClientRect();
        // Cells already visible on load render at full opacity from the start.
        if (rect.top < window.innerHeight * 0.9) {
          cell.classList.add('is-in-view');
        } else {
          cell.classList.add('needs-reveal');
          io.observe(cell);
        }
      });
    })();

    // Scroll cue: fade out once the user has actually scrolled a bit.
    (function () {
      const cue = document.querySelector('.scroll-cue');
      if (!cue) return;
      let hidden = false;
      let ticking = false;
      const HIDE_AFTER = 80; // px scrolled
      function update() {
        const shouldHide = window.scrollY > HIDE_AFTER;
        if (shouldHide !== hidden) {
          hidden = shouldHide;
          cue.classList.toggle('is-hidden', hidden);
        }
        ticking = false;
      }
      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(update);
          ticking = true;
        }
      }, { passive: true });
    })();
  </script>
