<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000000;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: breathe 5s ease-in-out infinite;
  }
  .logo {
    position: absolute;
    top: 50%;
    left: 50%;
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    opacity: 0;
    transform: translate(-50%, -50%);
    animation: crossfade 14s ease-in-out infinite;
  }
  .logo--horizontal {
    animation-delay: 0s;
  }
  .logo--stacked {
    animation-delay: -7s;
  }
  @keyframes crossfade {
    0%, 45%   { opacity: 1; }
    55%, 95%  { opacity: 0; }
    100%      { opacity: 1; }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }

  .wip {
    position: fixed;
    top: 2rem;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.3em;
    padding: 0.5rem 1rem;
    pointer-events: none;
    user-select: none;
  }
  .contact-wrap {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  }
  .contact-options {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }
  .contact-wrap.open .contact-options {
    display: flex;
  }
  .contact,
  .contact-option {
    color: #ffffff;
    text-decoration: none;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.3em;
    padding: 0.5rem 1rem;
    transition: color 0.2s ease;
  }
  .contact-option {
    font-size: 0.85rem;
  }
  .contact:hover,
  .contact:active,
  .contact:focus,
  .contact-option:hover,
  .contact-option:active,
  .contact-option:focus {
    color: #00dede;
    outline: none;
  }
</style>
</head>
<body>
  <div class="wip">WORK IN PROGRESS</div>
  <div class="logo-stage" role="img" aria-label="DEDE STUDIO">
    <img class="logo logo--horizontal" src="ASSETS/LOGO/logo_horizontal_cyan.png" alt="DEDE STUDIO" />
    <img class="logo logo--stacked" src="ASSETS/LOGO/logo_stacked_cyan.png" alt="DEDE STUDIO stacked" />
  </div>
  <div class="contact-wrap" id="contactWrap">
    <div class="contact-options">
      <a class="contact-option" href="mailto:00dede@bllcrw.com">MAIL APP</a>
      <a class="contact-option" href="https://mail.google.com/mail/?view=cm&fs=1&to=00dede@bllcrw.com" target="_blank" rel="noopener">GMAIL</a>
    </div>
    <button class="contact" type="button" id="contactBtn" aria-expanded="false">CONTACT</button>
  </div>
  <script>
    const wrap = document.getElementById('contactWrap');
    const btn = document.getElementById('contactBtn');
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = wrap.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen);
    });
    document.addEventListener('click', (e) => {
      if (!wrap.contains(e.target)) {
        wrap.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        wrap.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  </script>
</body>
</html>
