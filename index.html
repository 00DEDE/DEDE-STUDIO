<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DEDE STUDIO</title>
<link rel="icon" type="image/png" href="ASSETS/LOGO/logo_favicon.png" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000000;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo {
    width: 100vw;
    height: 100vh;
    background-color: #00dede;
    -webkit-mask-image: url("ASSETS/LOGO/DEDE_FINAL%20LOGO_BLACK.png");
            mask-image: url("ASSETS/LOGO/DEDE_FINAL%20LOGO_BLACK.png");
    -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
    -webkit-mask-position: center;
            mask-position: center;
    -webkit-mask-size: contain;
            mask-size: contain;
  }
  .contact {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffff;
    text-decoration: none;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.3em;
    padding: 0.75rem 1.5rem;
    transition: color 0.2s ease;
  }
  .contact:hover,
  .contact:active,
  .contact:focus {
    color: #00dede;
    outline: none;
  }
</style>
</head>
<body>
  <div class="logo" role="img" aria-label="DEDE STUDIO"></div>
  <a class="contact" href="mailto:00dede@bllcrw.com">CONTACT</a>
</body>
</html>
