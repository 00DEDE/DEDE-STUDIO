<link rel="stylesheet" href="site-bg.css" />
<style>
  html { background: #050505; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  body { background: transparent; }

  /* Splash loader: DĒDĒ logo centered, DĒDĒ_ICON's 4 horizontal lines
     load in one by one, filling from 75% white to a glowing cyan. */
  .loader {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
  }
  .loader__logo {
    /* 60% smaller than the previous 54vw hero logo → 21.6vw, capped for large/small. */
    width: clamp(160px, 21.6vw, 380px);
    height: auto;
    display: block;
  }
  .loader__icon {
    position: relative;
    width: clamp(90px, 13vw, 190px);
    aspect-ratio: 933 / 1083;   /* matches DEDE_ICON's content bbox */
  }
  /* Each bar is placed at the exact y-position of its counterpart in the icon.
     Base is 75% white; the cyan ::after slides in from the left to "fill" it. */
  .loader__line {
    position: absolute;
    left: 0;
    right: 0;
    top: var(--y);
    height: 5.5%;
    background: rgba(255, 255, 255, 0.75);
    border-radius: 999px;
    overflow: hidden;
  }
  .loader__line::after {
    content: '';
    position: absolute;
    inset: 0;
    background: #00dede;
    box-shadow:
      0 0 8px  rgba(0, 222, 222, 0.7),
      0 0 18px rgba(0, 222, 222, 0.45),
      0 0 32px rgba(0, 222, 222, 0.25);
    border-radius: 999px;
    transform: translateX(-101%);
    animation: line-fill 1s ease-out forwards;
    animation-delay: var(--delay);
  }
  @keyframes line-fill {
    to { transform: translateX(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .loader__line::after {
      animation: none;
      transform: translateX(0);
    }
  }
</style>
</head>
<body>
  <div class="site-bg" aria-hidden="true">
    <div class="site-bg__blob site-bg__blob--cyan-1"></div>
    <div class="site-bg__blob site-bg__blob--cyan-2"></div>
    <div class="site-bg__blob site-bg__blob--dark-1"></div>
    <div class="site-bg__blob site-bg__blob--dark-2"></div>
  </div>

  <div class="loader" role="status" aria-label="Loading DĒDĒ.STUDIO">
    <img class="loader__logo" src="ASSETS/LOGO/logo_horizontal_cyan.png" alt="DĒDĒ STUDIO" />
    <div class="loader__icon" aria-hidden="true">
      <!-- Positions and delays: y-values match the 4 line centers in DEDE_ICON;
           delays step 1s so lines load sequentially over 4s total. -->
      <div class="loader__line" style="--y: 0%;      --delay: 0s"></div>
      <div class="loader__line" style="--y: 19.76%;  --delay: 1s"></div>
      <div class="loader__line" style="--y: 57.16%;  --delay: 2s"></div>
      <div class="loader__line" style="--y: 94.55%;  --delay: 3s"></div>
    </div>
  </div>

  <script>
    // Cascade takes 4s (4 lines × 1s each). Give a brief settle beat, then
    // hand off to selections. Reduced-motion users skip the wait.
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const NAV_MS = reduced ? 400 : 4500;
    setTimeout(() => {
      window.location.href = 'selections.html';
    }, NAV_MS);
  </script>
</body>
