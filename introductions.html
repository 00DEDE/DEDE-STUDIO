<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>INTRODUCTIONS — I AM DĒDĒ.STUDIO</title>
<link rel="canonical" href="https://iamdede.com/introductions.html" />
<link rel="icon" type="image/png" sizes="96x96" href="ASSETS/LOGO/logo_favicon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="ASSETS/LOGO/apple-touch-icon.png" />
<link rel="manifest" href="site.webmanifest" />
<meta name="theme-color" content="#121212" />
<style>
  @font-face {
    font-family: "Akzidenz Grotesk";
    src: url("ASSETS/FONTS/AKZIDENZGROTESK-EXTRABOLD.OTF") format("opentype");
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #121212;
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  }
  .header-home-link {
    position: absolute;
    top: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: block;
    outline: none;
    transition: opacity 0.2s ease;
  }
  .header-home-link:hover,
  .header-home-link:focus-visible {
    opacity: 0.7;
  }
  .header-logo {
    width: 11vw;
    max-width: 160px;
    min-width: 90px;
    height: auto;
    display: block;
  }
  @media (max-width: 640px) {
    .header-logo {
      width: 13.75vw;
      max-width: 200px;
      min-width: 112px;
    }
  }
  .big-title {
    position: absolute;
    left: 0;
    right: 0;
    top: 22vh;
    margin: 0;
    text-align: center;
    color: #ffffff;
    font-family: "Akzidenz Grotesk", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
    white-space: nowrap;
    /* Fallback while JS auto-fits; JS overrides to exact viewport width. */
    font-size: 15vw;
  }
</style>
</head>
<body>
  <a class="header-home-link" href="home.html" aria-label="Back to home">
    <img class="header-logo" src="ASSETS/LOGO/logo_horizontal_cyan.png" alt="DEDE STUDIO" />
  </a>
  <h1 class="big-title"><span id="titleText">INTRODUCTIONS</span></h1>
  <script>
    function fitTitle() {
      const span = document.getElementById('titleText');
      const h1 = span && span.parentElement;
      if (!span || !h1) return;
      h1.style.fontSize = '100px';
      const scale = document.documentElement.clientWidth / span.offsetWidth;
      h1.style.fontSize = (100 * scale) + 'px';
    }
    window.addEventListener('load', fitTitle);
    window.addEventListener('resize', fitTitle);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(fitTitle);
    }
  </script>
</body>
</html>
