  @font-face {
    font-family: "Akzidenz Grotesk";
    src: url("ASSETS/FONTS/AKZIDENZGROTESK-EXTRABOLD.OTF") format("opentype");
    font-weight: 700;

  html { background: #050505; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    width: 100%;
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    cursor: url("ASSETS/LOGO/cursor_dede.png") 16 16, auto;
  }
  body { background: transparent; }
  .page-hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 6rem 5vw 4rem;
    box-sizing: border-box;
  }
  a, button, [role="button"] {
    cursor: url("ASSETS/LOGO/cursor_dede.png") 16 16, pointer;
  }
  .statement {
    margin: 0;
    color: #ffffff;
    font-family: "Akzidenz Grotesk", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: clamp(2.75rem, 9vw, 11rem);
    line-height: 1.05;
    letter-spacing: -0.02em;
    text-align: left;
    max-width: 100%;
  }
  .statement__predicate {
    transition: opacity 0.5s ease;
    display: inline;
  }
  .statement__logo {
    height: 0.78em;
    width: auto;
    vertical-align: -0.02em;
    display: inline-block;
  }
</style>
</head>
<body>
  <div class="site-bg" aria-hidden="true">
    <div class="site-bg__blob site-bg__blob--cyan-1"></div>
    <div class="site-bg__blob site-bg__blob--cyan-2"></div>
    <div class="site-bg__blob site-bg__blob--dark-1"></div>
    <div class="site-bg__blob site-bg__blob--dark-2"></div>
  </div>
  <header class="site-header">
    <a class="site-header__brand" href="home.html" aria-label="DEDE STUDIO — home">
      <img src="ASSETS/LOGO/logo_horizontal_cyan.png" alt="DEDE STUDIO" />
    </a>
    <nav class="site-header__nav" aria-label="Primary">
      <a href="selections.html">SELECTIONS</a>
      <a href="concepts.html">CONCEPTS</a>
      <a href="introductions.html">INTRODUCTIONS</a>
      <a href="connections.html">CONNECTIONS</a>
    </nav>
  </header>
  <script src="site-header.js" defer></script>
  <div class="page-hero">
    <h1 class="statement">I&nbsp;AM<span class="statement__predicate" id="statementPred">&nbsp;A STORY TELLER.</span></h1>
  </div>
  <footer class="site-footer">
    <a class="site-footer__logo" href="home.html" aria-label="DEDE STUDIO — home">
      <img src="ASSETS/LOGO/logo_horizontal_white.png" alt="DEDE STUDIO" />
    </a>
    <div class="site-footer__meta">
      <div class="site-footer__meta-left">
        <span>© 2026 ALL RIGHTS RESERVED.</span>
      </div>
      <div class="site-footer__meta-center">
        <span>DEFINE EXPRESSION. DESIGN EXISTENCE.</span>
      </div>
      <div class="site-footer__meta-right">
        <a href="#" onclick="event.preventDefault(); window.scrollTo({top:0,behavior:'smooth'});">BACK TO TOP</a>
        <a href="https://www.linkedin.com/" target="_blank" rel="noopener">LINKEDIN</a>
      </div>
    </div>
  </footer>
  <script>
    (function () {
      const variants = [
        ' A STORY TELLER.',
        ' A CREATIVE.',
        ' A DESIGNER.',
        ' A HUMAN BEING.',
        '__LOGO__'
      ];
      const logoHtml = ' <img class="statement__logo" src="ASSETS/LOGO/logo_dede_only_white.png" alt="DĒDĒ" />.';
      const el = document.getElementById('statementPred');
      let i = 0;
      const HOLD_MS = 2500;
      const FADE_MS = 500;

      function paint(variant) {
        if (variant === '__LOGO__') {
          el.innerHTML = logoHtml;
        } else {
          el.textContent = variant;
        }
      }

      setInterval(() => {
        el.style.opacity = '0';
        setTimeout(() => {
          i = (i + 1) % variants.length;
          paint(variants[i]);
          el.style.opacity = '1';
        }, FADE_MS);
      }, HOLD_MS + FADE_MS);
    })();
  </script>
</body>
</html>
