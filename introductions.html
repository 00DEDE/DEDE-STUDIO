<style>
  @font-face {
    font-family: "Akzidenz Grotesk";
    src: url("ASSETS/FONTS/AKZIDENZGROTESK-EXTRABOLD.OTF") format("opentype");
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #121212;
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    cursor: url("ASSETS/LOGO/cursor_dede.png") 16 16, auto;
  }
  a, button, [role="button"] {
    cursor: url("ASSETS/LOGO/cursor_dede.png") 16 16, pointer;
  }
  .big-title {
    position: absolute;
    left: 0;
    right: 0;
    top: 22vh;
    margin: 0;
    text-align: center;
    color: #ffffff;
    font-family: "Akzidenz Grotesk", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
    white-space: nowrap;
    /* Fallback while JS auto-fits; JS overrides to exact viewport width. */
    font-size: 15vw;
  }
</style>

  <header class="site-header">
    <a class="site-header__brand" href="home.html" aria-label="DEDE STUDIO — home">

    </nav>
  </header>
  <script src="site-header.js" defer></script>
  <h1 class="big-title"><span id="titleText">INTRODUCTIONS</span></h1>
  <script>
    function fitTitle() {
      const span = document.getElementById('titleText');
      const h1 = span && span.parentElement;
      if (!span || !h1) return;
      h1.style.fontSize = '100px';
      const scale = document.documentElement.clientWidth / span.offsetWidth;
      h1.style.fontSize = (100 * scale) + 'px';
    }
    window.addEventListener('load', fitTitle);
    window.addEventListener('resize', fitTitle);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(fitTitle);
    }
  </script>
</body>
